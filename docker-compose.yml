version: '3.9'

services:
  web:
    build: .
    command: gunicorn citizenservice.wsgi:application --bind 0.0.0.0:8000 --workers 2
    volumes:
      - .:/app        # Mounts local code into the container (useful for development)
    ports:
      - "8000:8000"   # Maps container port 8000 to your machine's port 8000
    env_file:
      - .env          # Loads environment variables from .env file

